        }
        #screenshotBtn {
            display: none;
        }

        .shake {
            animation: shake 0.2s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }

        }

        .culture-footer {
            font-size: 1.05rem;
            color: #8b4513;
            text-align: center;
            padding: 15px 0;
            letter-spacing: 1px;

            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .container {
                padding: 22px 18px;
                margin-bottom: 20px;

            }

                "凶": [{"序号":1,"关键词":"忍让","精简赠言":"退一步宽，让三分安"},{"序号":2,"关键词":"回避","精简赠言":"审时避厄，后福永安"},{"序号":3,"关键词":"转圜","精简赠言":"留有余地，路自宽阔"},{"序号":4,"关键词":"留心","精简赠言":"察微知著，福运不失"},{"序号":5,"关键词":"应变","精简赠言":"随机而变，无有滞碍"},{"序号":6,"关键词":"审慎","精简赠言":"明辨是非，行无纰漏"},{"序号":7,"关键词":"稳健","精简赠言":"坚守本心，邪扰不侵"}]
            },
            "self-cultivation": {
                "吉": [{"序号":1,"关键词":"谨慎","精简赠言":"谨言慎行，福泽自安"},{"序号":2,"关键词":"谦逊","精简赠言":"虚怀若谷，贵人相助"},{"序号":3,"关键词":"静心","精简赠言":"淡泊明志，万事顺遂"},{"序号":4,"关键词":"反思","精简赠言":"三省吾身，智慧日长"},{"序号":5,"关键词":"修养","精简赠言":"修身养性，福气自来"},{"序号":6,"关键词":"收敛","精简赠言":"锋芒内敛，静待光华"},{"序号":7,"关键词":"积累","精简赠言":"厚积薄发，终成大器"},{"序号":8,"关键词":"克制","精简赠言":"克制私欲，福寿康宁"},{"序号":9,"关键词":"接纳","精简赠言":"海纳百川，福泽深厚"},{"序号":10,"关键词":"释怀","精简赠言":"放下执念，自在逍遥"},{"序号":11,"关键词":"守恒","精简赠言":"动态平衡，万事恒昌"},{"序号":12,"关键词":"持守","精简赠言":"守道不移，初心不改"}],
                "凶": [{"序号":1,"关键词":"内省","精简赠言":"观心自照，慧根自生"},{"序号":2,"关键词":"自省","精简赠言":"日省吾身，迷途知返"},{"序号":3,"关键词":"克制","精简赠言":"敛欲守中，灾祸不侵"},{"序号":4,"关键词":"收敛","精简赠言":"藏锋敛芒，避凶增福"},{"序号":5,"关键词":"潜藏","精简赠言":"潜龙在渊，避祸待腾"},{"序号":6,"关键词":"磨砺","精简赠言":"历境锻心，厄尽业精"},{"序号":7,"关键词":"冷静","精简赠言":"处变不惊，决断无错"},{"序号":8,"关键词":"卸重","精简赠言":"轻装前行，避困身轻"}]
            },
            "relationship": {
                "吉": [{"序号":1,"关键词":"感情","精简赠言":"琴瑟和鸣，白首同心"},{"序号":2,"关键词":"安抚","精简赠言":"心平气和，家和事兴"},{"序号":3,"关键词":"培育","精简赠言":"精心浇灌，硕果累累"},{"序号":4,"关键词":"平复","精简赠言":"心平气顺，圆满初成"},{"序号":5,"关键词":"守护","精简赠言":"悉心护持，安享无忧"},{"序号":6,"关键词":"传承","精简赠言":"薪火相传，家业长青"}],
                "凶": [{"序号":1,"关键词":"调适","精简赠言":"身心相协，家事皆平"},{"序号":2,"关键词":"释然","精简赠言":"放下执念，家和福来"},{"序号":3,"关键词":"忍让","精简赠言":"退让一步，家宅安和"}]
            },
            "emergency": {
                "吉": [{"序号":1,"关键词":"调整","精简赠言":"精准施策，事半功倍"},{"序号":2,"关键词":"顺应","精简赠言":"顺天应人，运势昌隆"},{"序号":3,"关键词":"探索","精简赠言":"探幽索隐，新机尽显"},{"序号":4,"关键词":"果断","精简赠言":"当机立断，诸事不拖"},{"序号":5,"关键词":"超越","精简赠言":"破茧而出，境界自新"},{"序号":6,"关键词":"稳固","精简赠言":"根基如磐，无惧倾颓"},{"序号":7,"关键词":"鼓舞","精简赠言":"聚心聚力，合力倍增"},{"序号":8,"关键词":"领导","精简赠言":"振臂引领，大事可成"}],
                "凶": [{"序号":1,"关键词":"蓄力","精简赠言":"潜蓄能量，破厄如虹"},{"序号":2,"关键词":"守候","精简赠言":"静待时宜，静待转机"},{"序号":3,"关键词":"重生","精简赠言":"破茧新生，厄去运昌"},{"序号":4,"关键词":"深究","精简赠言":"探本求源，智增厄减"}]
            }
        };

        const specificAnswers = {
            "YES": ["宜行此事，顺天应人，功成可期","此路可行，坚守本心，终得善果","吉象已现，放手去做，万事顺遂","天时地利，人和兼具，大可为之","心之所向，素履以往，终能抵达"],
            "NO": ["暂宜静待，审时度势，再谋后动","此路多阻，另寻蹊径，方得通途","时运未到，休养生息，静待转机","三思而行，避凶就吉，方为上策","逆势而为，徒增烦忧，不如守拙"]
        };

        const resultEl = document.getElementById("result");
        const sceneSelect = document.getElementById("sceneType");
        const shakeBtn = document.getElementById("shakeBtn");
        const clearBtn = document.getElementById("clearBtn");
        const screenshotBtn = document.getElementById("screenshotBtn");
        
        let appState = {
            isShaking: false,
            pressTimer: null,
            shakeCount: 0,
            lastShakeTime: 0,
            shakeEndTimer: null,
            forceTimeoutTimer: null
        };

        const CONFIG = {
            SHAKE_THRESHOLD: 15,
            SHAKE_INTERVAL: 500,
            REQUIRED_SHAKES: 3,
            LONG_PRESS_TIME: 300,
            FORCE_TIMEOUT: 3000
        };

        let currentSignName = "";

        function resetAllStates() {
            if (appState.pressTimer) clearTimeout(appState.pressTimer);
            if (appState.shakeEndTimer) clearTimeout(appState.shakeEndTimer);
            if (appState.forceTimeoutTimer) clearTimeout(appState.forceTimeoutTimer);
            
            appState.isShaking = false;
            appState.shakeCount = 0;
            appState.lastShakeTime = 0;
            
            resultEl.classList.remove("shake");
            sceneSelect.disabled = false;
            clearBtn.disabled = false;
            screenshotBtn.style.display = "none";
        }

        function generateSign() {
            const selectedScene = sceneSelect.value;
            let signText = "";
            
            if (selectedScene === "specific") {
                const isYes = Math.random() > 0.4;
                const answerType = isYes ? "YES" : "NO";
                const randomAnswer = specificAnswers[answerType][Math.floor(Math.random() * specificAnswers[answerType].length)];
                signText = `【具体问题指引 · ${answerType}】\n关键词：${answerType}\n赠言：${randomAnswer}\n解语：请依此指引行事，三思而后行，终得善果。`;
                currentSignName = `具体问题指引-${answerType}.png`;
            } else {
                const sceneData = sceneLuckData[selectedScene];
                const luckType = Math.random() < 0.7 ? "吉" : "凶";
                const signList = sceneData[luckType];
                const randomSign = signList[Math.floor(Math.random() * signList.length)];
                const sceneNameMap = {"career":"事业发展","interpersonal":"处事待人","self-cultivation":"修身立德","relationship":"感情家庭","emergency":"应急破局"};
                signText = `【${sceneNameMap[selectedScene]} · ${luckType}签${String(randomSign.序号).padStart(2, '0')}】\n关键词：${randomSign.关键词}\n赠言：${randomSign.精简赠言}\n解语：此签主${luckType}，宜循此道而行，诸事${luckType === "吉" ? "顺遂" : "慎行"}。`;
                currentSignName = `${sceneNameMap[selectedScene]}-${luckType}签${String(randomSign.序号).padStart(2, '0')}.png`;
            }
            return signText;
        }

        function startShaking() {
            if (appState.isShaking || sceneSelect.value === "") return;
            
            appState.isShaking = true;
            sceneSelect.disabled = true;
            clearBtn.disabled = true;
            
            resultEl.classList.add("shake");
            resultEl.textContent = "摇签中...";
            screenshotBtn.style.display = "none";
            
            appState.forceTimeoutTimer = setTimeout(() => {
                if (appState.isShaking) {
                    stopShaking();
                }
            }, CONFIG.FORCE_TIMEOUT);
        }

        function stopShaking() {
            resetAllStates();
            const signContent = generateSign();
            resultEl.textContent = signContent;
            screenshotBtn.style.display = "inline-block";
        }

        function captureResult() {
            html2canvas(resultEl, {
                backgroundColor: "#fffaf0",
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = currentSignName;
                    link.click();
                    URL.revokeObjectURL(url);
                }, 'image/png');
            }).catch(err => {
                alert("截图保存失败，请允许浏览器下载权限后重试");
                console.error(err);
            });
        }

        function clearSign() {
            if (appState.isShaking) return;
            
            resultEl.textContent = "等待求签...";
            screenshotBtn.style.display = "none";
            currentSignName = "";
        }

        sceneSelect.addEventListener('change', function() {
            const selectedValue = this.value;
            shakeBtn.disabled = selectedValue === "";
            
            if (selectedValue === "" && !appState.isShaking) {
                resultEl.textContent = "等待求签...";
                screenshotBtn.style.display = "none";
            }
        });

        shakeBtn.addEventListener('mousedown', function(e) {
            if (this.disabled || appState.isShaking) return;
            
            appState.pressTimer = setTimeout(() => {
                startShaking();
            }, CONFIG.LONG_PRESS_TIME);
        });

        ['mouseup', 'mouseleave'].forEach(evt => {
            shakeBtn.addEventListener(evt, function() {
                clearTimeout(appState.pressTimer);
                if (appState.isShaking) {
                    stopShaking();
                }
            });
        });

        shakeBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (this.disabled || appState.isShaking) return;
            
            appState.pressTimer = setTimeout(() => {
                startShaking();
            }, CONFIG.LONG_PRESS_TIME);
        });

        shakeBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            clearTimeout(appState.pressTimer);
            if (appState.isShaking) {
                stopShaking();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && !appState.isShaking && sceneSelect.value !== "") {
                e.preventDefault();
                appState.pressTimer = setTimeout(() => {
                    startShaking();
                }, CONFIG.LONG_PRESS_TIME);
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                clearTimeout(appState.pressTimer);
                if (appState.isShaking) {
                    stopShaking();
                }
            }
        });

        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', (e) => {
                if (appState.isShaking || sceneSelect.value === "") return;
                
                const yAccel = Math.abs(e.accelerationIncludingGravity.y);
                const now = Date.now();
                
                if (yAccel > CONFIG.SHAKE_THRESHOLD && (now - appState.lastShakeTime) > CONFIG.SHAKE_INTERVAL) {
                    appState.lastShakeTime = now;
                    appState.shakeCount++;
                    
                    if (appState.shakeCount >= CONFIG.REQUIRED_SHAKES) {
                        startShaking();
                        appState.shakeEndTimer = setTimeout(() => {
                            stopShaking();
                        }, 2000);
                    }
                }
            });
        }

        window.addEventListener('load', function() {
            resetAllStates();
            shakeBtn.disabled = sceneSelect.value === "";
        });
    </script>
</body>
</html>
